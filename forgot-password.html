<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Stock Market Prediction</title>
    <link rel="stylesheet" href="css/style.css" />
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
      })();
    </script>
  </head>
  <body>
    <div class="fixed-top-right">
      <button id="themeToggle" class="btn btn-secondary" type="button" title="Toggle Theme">
        <span id="themeIcon">☀️</span>
      </button>
    </div>
    <div class="centered">
      <div class="card" style="max-width: 520px; width: 100%;">
        <h1 style="margin-top:0;">Forgot Password</h1>
        <form id="forgotForm" class="form">
          <label>
            Enter your email address
            <input type="email" name="email" required placeholder="you@example.com" />
          </label>
          <button class="btn" type="submit">Send Reset Link</button>
          <p id="forgotMsg" class="msg"></p>
        </form>
        <p class="muted" style="margin-bottom:0;">
          <a href="login.html">Back to Login</a>
        </p>
      </div>
    </div>
    <script src="js/forgot.js"></script>
  </body>
</html>
